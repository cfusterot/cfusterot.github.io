<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV | Coral Fustero-Torre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #1a1a1a;
            --light-grey: #666;
            --border-color: #eee;
        }

        body {
            font-family: 'Courier Prime', monospace;
            margin: 0;
            padding: 0;
            color: var(--text-color);
            background-color: #fff;
            line-height: 1.6;
        }

        header {
            padding: 4rem 2rem 1rem 2rem;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { 
            text-decoration: none; 
            color: #000; 
            font-weight: 700;
            font-size: 1.2rem;
        }

        nav a { 
            text-decoration: none; 
            color: var(--light-grey); 
            font-size: 0.9rem;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 2rem 5rem 2rem;
        }

        .download-btn {
            display: inline-block;
            margin-bottom: 3rem;
            padding: 10px 20px;
            border: 1px solid var(--text-color);
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background-color: var(--text-color);
            color: #fff;
        }

        section { margin-bottom: 3.5rem; }

        h2 {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 1.5rem;
        }

        .cv-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .cv-content { flex: 1; }
        .cv-date { 
            color: var(--light-grey); 
            font-size: 0.85rem; 
            text-align: right; 
            margin-left: 20px;
            min-width: 120px;
        }

        .cv-title { font-weight: 700; display: block; }
        .cv-subtitle { font-style: italic; color: var(--light-grey); display: block; margin-bottom: 5px; }
        .cv-description { font-size: 0.9rem; margin: 0; padding: 0; }
        .cv-description li { list-style: none; margin-bottom: 3px; }

        footer {
            padding: 3rem 2rem;
            max-width: 800px;
            margin: 0 auto;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--light-grey);
        }

        @media (max-width: 600px) {
            .cv-item { flex-direction: column; }
            .cv-date { text-align: left; margin-left: 0; margin-top: 5px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Coral Fustero-Torre</a>
        <nav><a href="index.html">← Back</a></nav>
    </header>

    <main>
        <a href="Coral_Fustero_CV2025.pdf" class="download-btn" target="_blank">Download Full CV (PDF)</a>

        <section>
            <h2>Experience</h2>
            
            <div class="cv-item">
                <div class="cv-content">
                    <span class="cv-title">Postdoctoral Researcher</span>
                    <span class="cv-subtitle">Berlin Institute for Medical Systems
