<!DOCTYPE html>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #1a1a1a;
            --light-grey: #888;
            --bg-color: #ffffff;
            --border: #eee;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 3rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { text-decoration: none; color: #000; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        nav a { text-decoration: none; color: var(--light-grey); font-size: 0.8rem; text-transform: uppercase; font-weight: 600; }

        main { padding: 0 2rem 5rem 2rem; max-width: 1400px; margin: 0 auto; }

        /* Categorías */
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--light-grey);
            margin: 4rem 0 2rem 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            font-weight: 400;
        }

        /* Masonry Layout ajustado (más columnas = imágenes más pequeñas) */
        .masonry-gallery {
            column-count: 4; 
            column-gap: 20px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 20px;
            cursor: pointer;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover img {
            opacity: 0.7;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: zoom-out;
        }

        .lightbox img {
            max-width: 85%;
            max-height: 85vh;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
        }

        /* Responsive */
        @media (max-width: 1100px) { .masonry-gallery { column-count: 3; } }
        @media (max-width: 800px) { .masonry-gallery { column-count: 2; } }
        @media (max-width: 500px) { .masonry-gallery { column-count: 1; } }
    </style>
</head>
