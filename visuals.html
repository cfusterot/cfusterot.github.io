<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visuals | Coral Fustero-Torre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #1a1a1a;
            --light-grey: #666;
            --bg-color: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            padding: 3rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { text-decoration: none; color: #000; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        nav a { text-decoration: none; color: var(--light-grey); font-size: 0.8rem; text-transform: uppercase; font-weight: 600; }

        main { padding: 0 1rem 5rem 1rem; max-width: 1400px; margin: 0 auto; }

        /* MASONRY LAYOUT (Estilo Erica Fustero) */
        .masonry-gallery {
            column-count: 3; /* 3 columnas en desktop */
            column-gap: 15px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 15px;
            cursor: pointer;
            overflow: hidden;
            background-color: #f9f9f9;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease, opacity 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.03);
            opacity: 0.9;
        }

        /* LIGHTBOX (Imagen ampliada) */
        .lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); /* Fondo blanco casi opaco, muy limpio */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: zoom-out;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .close-lightbox {
            position: absolute;
            top: 30px; right: 40px;
            font-size: 2rem;
            font-weight: 200;
            cursor: pointer;
        }

        @media (max-width: 1000px) { .masonry-gallery { column-count: 2; } }
        @media (max-width: 600px) { .masonry-gallery { column-count: 1; } }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Coral Fustero-Torre</a>
        <nav><a href="index.html">← Back to Research</a></nav>

        </div>
    </main>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
        // Lógica para abrir/cerrar el lightbox
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const galleryItems = document.querySelectorAll('.gallery-item img');

        galleryItems.forEach(img => {
            img.parentElement.onclick = () => {
                lightbox.style.display = 'flex';
                lightboxImg.src = img.src;
            };
        });

        function closeLightbox() {
            lightbox.style.display = 'none';
        }

        // Cerrar con la tecla ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>

</body>
</html>
