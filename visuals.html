<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visuals | Coral Fustero-Torre</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #333;
            --paper-bg: #e5e5e2; 
            /* Deep Ink Texture */
            --ink-texture: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyIiBoZWlnaHQ9IjIiPjxjaXJjbGUgY3g9IjEiIGN5PSIxIiByPSIwLjgiIGZpbGw9IiM0NDQiIGZpbGwtb3BhY2l0eT0iMC41IiAvPjwvc3ZnPg==');
        }

        body {
            font-family: 'Courier Prime', monospace;
            margin: 0;
            background-color: var(--paper-bg);
            color: var(--text-color);
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxm Filter id="n"><ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC45IiBudW1PY3RhdmVzPSI0IiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0ibm9uZSIgZmlsdGVyPSJ1cmwoI24pIiBvcGFjaXR5PSIwLjA5Ii8+PC9zdmc+');
        }

        header { padding: 3rem 2rem; max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: baseline; }
        .logo { text-decoration: none; color: #000; font-weight: 700; font-size: 1.1rem; }
        nav a { text-decoration: none; color: #777; font-size: 0.85rem; }

        main { padding: 0 2rem 10rem 2rem; max-width: 1400px; margin: 0 auto; }

        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            margin: 8rem 0 3rem 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.4;
        }

        /* --- COLLAGE GRID --- */
        .archive-puzzle {
            display: grid;
            grid-template-columns: repeat(24, 1fr); 
            grid-auto-rows: 40px; 
            grid-auto-flow: dense; 
            gap: 12px;
            margin-bottom: 10rem;
        }

        .archive-puzzle > img, .archive-puzzle > video { display: none; }

        .gallery-item {
            position: relative;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            z-index: 1;
        }

        /* SIZES */
        .size-s { grid-column: span 4; grid-row: span 4; }
        .size-m { grid-column: span 7; grid-row: span 7; }
        .size-l { grid-column: span 10; grid-row: span 12; }
        .size-tall { grid-column: span 5; grid-row: span 11; }
        .size-wide { grid-column: span 12; grid-row: span 6; }
        .size-silhouette { grid-column: span 9; grid-row: span 15; z-index: 10; }

        /* CUTS */
        .cut-organic-1 { clip-path: polygon(2% 0%, 98% 3%, 100% 95%, 3% 100%); }
        .cut-organic-2 { clip-path: polygon(0% 5%, 100% 0%, 96% 92%, 4% 100%); }
        .cut-tri { clip-path: polygon(50% 0%, 100% 100%, 0% 100%); }
        .cut-circle { clip-path: circle(48% at 50% 50%); }
        .cut-lshape { clip-path: polygon(0% 0%, 100% 0%, 100% 45%, 45% 45%, 45% 100%, 0% 100%); }
        
        /* Silhouette: No clip, respects transparency of the PNG file */
        .cut-none { clip-path: none !important; }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(170%) brightness(105%);
            opacity: 0.95;
            transition: inherit;
            display: block !important;
        }

        /* For transparent PNG silhouettes */
        .gallery-item.type-silhouette img { 
            object-fit: contain !important; 
        }

        .gallery-item::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: var(--ink-texture);
            background-size: 2px 2px;
            mix-blend-mode: multiply;
            pointer-events: none;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        /* HOVER: REVEAL COLOR & RECTANGLE */
        .gallery-item:hover {
            transform: scale(1.08) rotate(0deg) !important;
            z-index: 100;
            clip-path: none !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .gallery-item:hover img, .gallery-item:hover video {
            filter: grayscale(0%) contrast(100%) brightness(100%);
            opacity: 1;
        }

        .gallery-item:hover::after { opacity: 0; }

        /* LIGHTBOX */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none; justify-content: center; align-items: center;
            z-index: 2000;
        }

        .lightbox-content { position: relative; max-width: 85%; max-height: 85vh; display: flex; align-items: center; justify-content: center; }
        #lightbox-img, #lightbox-video { max-width: 100%; max-height: 85vh; filter: none; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 2.5rem; cursor: pointer; padding: 20px; color: #000; font-family: 'Courier Prime', monospace; }
        #prev-btn { left: -80px; }
        #next-btn { right: -80px; }

        @media (max-width: 900px) {
            .archive-puzzle { grid-template-columns: repeat(12, 1fr); grid-auto-rows: 50px; }
            #prev-btn { left: -40px; } #next-btn { right: -40px; }
        }

        footer { padding: 5rem 2rem; text-align: center; font-size: 0.7rem; color: #999; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Coral Fustero-Torre</a>
        <nav><a href="art.html">← MENU</a></nav>
    </header>

        <div class="section-title">02. Collage</div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <button id="prev-btn" class="nav-btn" onclick="changeMedia(-1)">←</button>
            <img id="lightbox-img" src="" style="display:none;">
            <video id="lightbox-video" src="" controls style="display:none;"></video>
            <button id="next-btn" class="nav-btn" onclick="changeMedia(1)">→</button>
        </div>
    </div>

    <footer>&copy; 2026 Coral Fustero-Torre</footer>

    <script>
        function initializeArchive() {
            const sizes = ['size-s', 'size-m', 'size-tall', 'size-wide'];
            const cuts = ['cut-organic-1', 'cut-organic-2', 'cut-tri', 'cut-circle', 'cut-lshape'];
            let mediaItems = [];
            let currentIndex = 0;

            const puzzles = document.querySelectorAll('.archive-puzzle');

            puzzles.forEach(puzzle => {
                const mediaElements = Array.from(puzzle.children);
                
                mediaElements.forEach(media => {
                    if (media.tagName === 'IMG' || media.tagName === 'VIDEO') {
                        const wrapper = document.createElement('div');
                        const isSilhouette = media.getAttribute('data-type') === 'silhouette';
                        let randCut;
                        let randSize;

                        if (isSilhouette) {
                            randCut = 'cut-none';
                            randSize = 'size-silhouette';
                            wrapper.classList.add('type-silhouette');
                        } else {
                            randSize = sizes[Math.floor(Math.random() * sizes.length)];
                            randCut = cuts[Math.floor(Math.random() * cuts.length)];
                        }
                        
                        wrapper.className = `gallery-item ${randSize} ${randCut}`;
                        const rot = (Math.random() * 6 - 3).toFixed(1);
                        wrapper.style.transform = `rotate(${rot}deg)`;

                        puzzle.replaceChild(wrapper, media);
                        wrapper.appendChild(media);
                        
                        mediaItems.push({ type: media.tagName.toLowerCase(), src: media.src });

                        wrapper.onclick = () => {
                            currentIndex = mediaItems.findIndex(item => item.src === media.src);
                            updateLightbox();
                        };
                    }
                });
            });

            function updateLightbox() {
                const item = mediaItems[currentIndex];
                const lbImg = document.getElementById('lightbox-img');
                const lbVid = document.getElementById('lightbox-video');
                if (item.type === 'img') {
                    lbImg.src = item.src; lbImg.style.display = 'block'; lbVid.style.display = 'none'; lbVid.pause();
                } else {
                    lbVid.src = item.src; lbVid.style.display = 'block'; lbImg.style.display = 'none'; lbVid.play();
                }
                document.getElementById('lightbox').style.display = 'flex';
            }

            window.changeMedia = (step) => {
                currentIndex = (currentIndex + step + mediaItems.length) % mediaItems.length;
                updateLightbox();
            };

            window.closeLightbox = () => {
                document.getElementById('lightbox').style.display = 'none';
                document.getElementById('lightbox-video').pause();
            };

            document.addEventListener('keydown', (e) => {
                if (document.getElementById('lightbox').style.display === 'flex') {
                    if (e.key === "ArrowLeft") changeMedia(-1);
                    if (e.key === "ArrowRight") changeMedia(1);
                    if (e.key === "Escape") closeLightbox();
                }
            });
        }

        initializeArchive();
    </script>
</body>
