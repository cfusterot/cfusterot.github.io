<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visuals | Coral Fustero-Torre</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #333;
            --paper-bg: #e5e5e2; 
            --ink-color: #555; 
            --halftone: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyIiBoZWlnaHQ9IjIiPjxjaXJjbGUgY3g9IjEiIGN5PSIxIiByPSIwLjQiIGZpbGw9IiM2NjYiIGZpbGwtb3BhY2l0eT0iMC4yNSIgLz48L3N2Zz4=');
        }

        body {
            font-family: 'Courier Prime', monospace;
            margin: 0;
            background-color: var(--paper-bg);
            color: var(--text-color);
        }

        header { padding: 3rem 2rem; max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: baseline; }
        .logo { text-decoration: none; color: #000; font-weight: 700; font-size: 1.1rem; }
        nav a { text-decoration: none; color: #777; font-size: 0.85rem; }

        main { padding: 0 2rem 10rem 2rem; max-width: 1400px; margin: 0 auto; }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin: 6rem 0 2rem 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 5px;
        }

        /* --- THE DYNAMIC GRID --- */
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            grid-auto-rows: 150px;
            grid-auto-flow: dense; /* This fills in gaps for a tighter collage feel */
            gap: 25px;
        }

        .gallery-item {
            position: relative;
            cursor: pointer;
            background-color: #fff;
            transition: all 0.4s ease;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* DYNAMIC SIZE CLASSES */
        .size-s { grid-column: span 1; grid-row: span 1; }
        .size-m { grid-column: span 2; grid-row: span 2; }
        .size-l { grid-column: span 2; grid-row: span 3; }
        .size-w { grid-column: span 3; grid-row: span 2; }

        /* CUT CLASSES */
        .cut-1 { clip-path: polygon(2% 0%, 95% 4%, 100% 30%, 98% 95%, 40% 98%, 0% 80%); }
        .cut-2 { clip-path: polygon(5% 5%, 100% 0, 95% 95%, 0 100%); }
        .cut-3 { clip-path: polygon(0% 15%, 20% 0%, 100% 10%, 90% 85%, 15% 100%); }
        .cut-4 { clip-path: polygon(0 0, 90% 5%, 100% 100%, 10% 90%); }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(130%) brightness(115%);
            opacity: 0.9;
        }

        .gallery-item::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: var(--halftone);
            background-size: 2px 2px;
            mix-blend-mode: multiply;
            pointer-events: none;
        }

        .gallery-item:hover {
            transform: scale(1.05) rotate(0deg) !important;
            z-index: 100;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.1);
        }

        /* LIGHTBOX */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none; justify-content: center; align-items: center;
            z-index: 2000;
        }

        .lightbox-content { position: relative; max-width: 85%; max-height: 85vh; }
        #lightbox-img, #lightbox-video { max-width: 100%; max-height: 85vh; filter: none; clip-path: none; }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 2.5rem; cursor: pointer; color: #000; padding: 20px; z-index: 2100; }
        #prev-btn { left: -80px; }
        #next-btn { right: -80px; }

        @media (max-width: 600px) {
            #prev-btn { left: -40px; }
            #next-btn { right: -40px; }
            .size-m, .size-l, .size-w { grid-column: span 1; grid-row: span 1; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Coral Fustero-Torre</a>
        <nav><a href="art.html">← MENU</a></nav>
    </header>

        </div>
    </main>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <button id="prev-btn" class="nav-btn" onclick="changeMedia(-1)">←</button>
            <img id="lightbox-img" src="" style="display:none;">
            <video id="lightbox-video" src="" controls style="display:none;"></video>
            <button id="next-btn" class="nav-btn" onclick="changeMedia(1)">→</button>
        </div>
    </div>

    <script>
        const sizes = ['size-s', 'size-m', 'size-l', 'size-w'];
        const cuts = ['cut-1', 'cut-2', 'cut-3', 'cut-4'];
        let mediaItems = [];
        let currentIndex = 0;

        // Automatically wrap images/videos in gallery containers
        document.querySelectorAll('.archive-grid img, .archive-grid video').forEach((media) => {
            const wrapper = document.createElement('div');
            wrapper.className = `gallery-item ${sizes[Math.floor(Math.random()*sizes.length)]} ${cuts[Math.floor(Math.random()*cuts.length)]}`;
            
            // Give it a random slight rotation
            const rot = (Math.random() * 6 - 3).toFixed(1);
            wrapper.style.transform = `rotate(${rot}deg)`;
            
            media.parentNode.insertBefore(wrapper, media);
            wrapper.appendChild(media);

            mediaItems.push({ type: media.tagName.toLowerCase(), src: media.src });
            
            wrapper.onclick = () => {
                currentIndex = mediaItems.findIndex(item => item.src === media.src);
                updateLightbox();
            };
        });

        function updateLightbox() {
            const item = mediaItems[currentIndex];
            const lbImg = document.getElementById('lightbox-img');
            const lbVid = document.getElementById('lightbox-video');
            
            if (item.type === 'img') {
                lbImg.src = item.src; lbImg.style.display = 'block'; lbVid.style.display = 'none'; lbVid.pause();
            } else {
                lbVid.src = item.src; lbVid.style.display = 'block'; lbImg.style.display = 'none'; lbVid.play();
            }
            document.getElementById('lightbox').style.display = 'flex';
        }

        function changeMedia(step) {
            currentIndex = (currentIndex + step + mediaItems.length) % mediaItems.length;
            updateLightbox();
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.getElementById('lightbox-video').pause();
        }
    </script>
</body>
</html>
