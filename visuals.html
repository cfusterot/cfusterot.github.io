<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visuals | Coral Fustero-Torre</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #333;
            --paper-bg: #e5e5e2; 
            --halftone: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyIiBoZWlnaHQ9IjIiPjxjaXJjbGUgY3g9IjEiIGN5PSIxIiByPSIwLjQiIGZpbGw9IiM2NjYiIGZpbGwtb3BhY2l0eT0iMC4yNSIgLz48L3N2Zz4=');
        }

        body {
            font-family: 'Courier Prime', monospace;
            margin: 0;
            background-color: var(--paper-bg);
            color: var(--text-color);
        }

        header { 
            padding: 3rem 2rem; 
            max-width: 1400px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: baseline;
        }

        .logo { text-decoration: none; color: #000; font-weight: 700; font-size: 1.1rem; }
        nav a { text-decoration: none; color: #777; font-size: 0.85rem; }

        main { padding: 0 2rem 10rem 2rem; max-width: 1400px; margin: 0 auto; }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin: 6rem 0 2rem 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 5px;
        }

        /* --- STABILIZED FRAGMENTED GRID --- */
        .archive-puzzle {
            display: grid;
            /* 24 columns on desktop ensures small, complementary pieces */
            grid-template-columns: repeat(24, 1fr); 
            /* Hard-cap the height so pieces don't get giant */
            grid-auto-rows: 45px; 
            grid-auto-flow: dense; 
            gap: 10px;
            margin-bottom: 8rem;
        }

        .archive-puzzle > img, .archive-puzzle > video { display: none; }

        .gallery-item {
            position: relative;
            cursor: pointer;
            background-color: transparent;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            z-index: 1;
        }

        /* Adjusted Spans for 24-column density */
        .size-square { grid-column: span 4; grid-row: span 4; }
        .size-large  { grid-column: span 7; grid-row: span 7; }
        .size-wide   { grid-column: span 8; grid-row: span 4; }
        .size-tall   { grid-column: span 4; grid-row: span 8; }
        .size-small  { grid-column: span 3; grid-row: span 3; }

        /* JAGGED SCISSOR CUTS */
        .cut-organic-1 { clip-path: polygon(2% 0%, 98% 3%, 100% 95%, 3% 100%); }
        .cut-organic-2 { clip-path: polygon(0% 5%, 100% 0%, 96% 92%, 4% 100%); }
        .cut-organic-3 { clip-path: polygon(3% 3%, 95% 0%, 100% 100%, 0% 95%); }
        .cut-tri { clip-path: polygon(50% 0%, 100% 100%, 0% 100%); }
        
        /* Silhouette cuts for Human Figures */
        .cut-silhouette { clip-path: polygon(30% 0%, 70% 0%, 85% 15%, 95% 40%, 85% 100%, 15% 100%, 5% 40%, 15% 15%); }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(140%) brightness(110%);
            opacity: 0.9;
            transition: inherit;
            display: block !important;
        }

        .gallery-item::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: var(--halftone);
            background-size: 2px 2px;
            mix-blend-mode: multiply;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        /* HOVER REVEAL */
        .gallery-item:hover {
            transform: scale(1.05) rotate(0deg) !important;
            z-index: 100;
            clip-path: none !important;
            box-shadow: 0 15px 45px rgba(0,0,0,0.2);
        }

        .gallery-item:hover img, .gallery-item:hover video {
            filter: grayscale(0%) contrast(100%) brightness(100%);
            opacity: 1;
        }

        .gallery-item:hover::after { opacity: 0; }

        /* LIGHTBOX */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none; justify-content: center; align-items: center;
            z-index: 2000;
        }

        .lightbox-content { 
            position: relative; 
            max-width: 85%; 
            max-height: 85vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        #lightbox-img, #lightbox-video { 
            max-width: 100%; 
            max-height: 85vh; 
            filter: none; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.1); 
        }

        .nav-btn { 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            background: none; 
            border: none; 
            font-size: 2.5rem; 
            cursor: pointer; 
            padding: 20px; 
            color: #000; 
        }
        
        #prev-btn { left: -80px; }
        #next-btn { right: -80px; }

        @media (max-width: 1024px) {
            .archive-puzzle { grid-template-columns: repeat(12, 1fr); grid-auto-rows: 60px; }
            .size-large { grid-column: span 6; grid-row: span 6; }
        }

        @media (max-width: 600px) {
            .archive-puzzle { grid-template-columns: repeat(6, 1fr); grid-auto-rows: 50px; }
            .size-large, .size-wide, .size-tall { grid-column: span 4; grid-row: span 4; }
            #prev-btn { left: -40px; } #next-btn { right: -40px; }
        }

        footer { padding: 5rem 2rem; text-align: center; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Coral Fustero-Torre</a>
        <nav><a href="art.html">← MENU</a></nav>
    </header>

    <main>

            <img src="img/photography/R1-04726-0003.jpg">
            <img src="img/photography/R1-04726-0008.jpg">
            <img src="img/photography/R1-04726-0014.jpg">

        <div class="section-title">02. Collage</div>
        <div class="archive-puzzle" id="collage-puzzle">
            <img src="img/collage/1.png">

        <div class="section-title">03. Film</div>
        <div class="archive-puzzle" id="film-puzzle">
            <video src="vid/super8/flores.mp4" muted loop></video>

        </div>
    </main>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <button id="prev-btn" class="nav-btn" onclick="changeMedia(-1)">←</button>
            <img id="lightbox-img" src="" style="display:none;">
            <video id="lightbox-video" src="" controls style="display:none;"></video>
            <button id="next-btn" class="nav-btn" onclick="changeMedia(1)">→</button>
        </div>
    </div>

    <footer>&copy; 2026 Coral Fustero-Torre</footer>

    <script>
        function initializeArchive() {
            const sizes = ['size-square', 'size-large', 'size-wide', 'size-tall', 'size-small'];
            const organicCuts = ['cut-organic-1', 'cut-organic-2', 'cut-organic-3'];
            
            let mediaItems = [];
            let currentIndex = 0;

            const puzzles = document.querySelectorAll('.archive-puzzle');

            puzzles.forEach(puzzle => {
                const isPhotography = puzzle.id === 'photo-puzzle';
                const mediaElements = Array.from(puzzle.children);
                
                mediaElements.forEach(media => {
                    if (media.tagName === 'IMG' || media.tagName === 'VIDEO') {
                        const wrapper = document.createElement('div');
                        const randSize = sizes[Math.floor(Math.random() * sizes.length)];
                        
                        let randCut;
                        const dice = Math.random();

                        if (isPhotography && (randSize === 'size-large' || randSize === 'size-tall')) {
                            if (dice < 0.4) {
                                randCut = 'cut-silhouette';
                            } else if (dice < 0.5) {
                                randCut = 'cut-tri';
                            } else {
                                randCut = organicCuts[Math.floor(Math.random() * organicCuts.length)];
                            }
                        } else {
                            randCut = dice < 0.05 ? 'cut-tri' : organicCuts[Math.floor(Math.random() * organicCuts.length)];
                        }
                        
                        wrapper.className = `gallery-item ${randSize} ${randCut}`;
                        
                        const rot = (Math.random() * 3 - 1.5).toFixed(1);
                        wrapper.style.transform = `rotate(${rot}deg)`;

                        puzzle.replaceChild(wrapper, media);
                        wrapper.appendChild(media);
                        
                        mediaItems.push({ type: media.tagName.toLowerCase(), src: media.src });

                        wrapper.onclick = () => {
                            currentIndex = mediaItems.findIndex(item => item.src === media.src);
                            updateLightbox();
                        };
                    }
                });
            });

            function updateLightbox() {
                const item = mediaItems[currentIndex];
                const lbImg = document.getElementById('lightbox-img');
                const lbVid = document.getElementById('lightbox-video');
                
                if (item.type === 'img') {
                    lbImg.src = item.src; lbImg.style.display = 'block'; lbVid.style.display = 'none'; lbVid.pause();
                } else {
                    lbVid.src = item.src; lbVid.style.display = 'block'; lbImg.style.display = 'none'; lbVid.play();
                }
                document.getElementById('lightbox').style.display = 'flex';
            }

            window.changeMedia = (step) => {
                currentIndex = (currentIndex + step + mediaItems.length) % mediaItems.length;
                updateLightbox();
            };

            window.closeLightbox = () => {
                document.getElementById('lightbox').style.display = 'none';
                document.getElementById('lightbox-video').pause();
            };

            document.addEventListener('keydown', (e) => {
                if (document.getElementById('lightbox').style.display === 'flex') {
                    if (e.key === "ArrowLeft") changeMedia(-1);
                    if (e.key === "ArrowRight") changeMedia(1);
                    if (e.key === "Escape") closeLightbox();
                }
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeArchive);
        } else {
            initializeArchive();
        }
    </script>
</body>
</html>
