<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visuals | Coral Fustero-Torre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #1a1a1a;
            --light-grey: #888;
            --bg-color: #ffffff;
            --border: #eee;
        }

        body {
            font-family: 'Courier Prime', monospace;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            padding: 3rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { 
            text-decoration: none; 
            color: #000; 
            font-family: 'Pixelify Sans', sans-serif;
            font-size: 1.2rem;
        }

        nav a { 
            text-decoration: none; 
            color: var(--light-grey); 
            font-size: 0.9rem;
        }

        main { padding: 0 2rem 5rem 2rem; max-width: 1400px; margin: 0 auto; }

        .section-title {
            font-family: 'Pixelify Sans', sans-serif;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-color);
            margin: 4rem 0 2rem 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .masonry-gallery {
            column-count: 4; 
            column-gap: 20px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 20px;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover img { opacity: 0.7; }

        .lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: zoom-out;
        }

        .lightbox img {
            max-width: 85%;
            max-height: 85vh;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
        }

        @media (max-width: 1100px) { .masonry-gallery { column-count: 3; } }
        @media (max-width: 800px) { .masonry-gallery { column-count: 2; } }
        @media (max-width: 500px) { .masonry-gallery { column-count: 1; } }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Coral Fustero-Torre</a>
        <nav><a href="index.html">← Back to Research</a></nav>
    </header>

    <main>
        <h2 class="section-title">01. Photography</h2>
        <div class="masonry-gallery">
            <div class="gallery-item"><img src="img/photography/R1-04013-0007.jpg" alt=""></div>
            </div>

        <h2 class="section-title">02. Collage</h2>
        <div class="masonry-gallery">
            <div class="gallery-item"><img src="img/collage/1.png" alt=""></div>
            </div>
    </main>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        document.querySelectorAll('.gallery-item img').forEach(img => {
            img.onclick = (e) => {
                e.stopPropagation();
                lightbox.style.display = 'flex';
                lightboxImg.src = img.src;
            };
        });
    </script>
</body>
</html>
