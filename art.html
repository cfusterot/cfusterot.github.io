<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art | Coral Fustero-Torre</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #666; 
            --paper-bg: #e5e5e2; 
            --ink-texture: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyIiBoZWlnaHQ9IjIiPjxjaXJjbGUgY3g9IjEiIGN5PSIxIiByPSIwLjUiIGZpbGw9IiM3NzciIGZpbGwtb3BhY2l0eT0iMC4yNSIgLz48L3N2Zz4=');
        }

        body {
            font-family: 'Courier Prime', monospace;
            margin: 0;
            background-color: var(--paper-bg);
            color: var(--text-color);
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxm Filter id="n"><ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC45IiBudW1PY3RhdmVzPSI0IiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0ibm9uZSIgZmlsdGVyPSJ1cmwoI24pIiBvcGFjaXR5PSIwLjA4Ii8+PC9zdmc+');
        }

        header { padding: 4rem 2rem 1rem 2rem; max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: baseline; }
        .logo { text-decoration: none; color: var(--text-color); font-weight: 700; font-size: 1.5rem; }
        nav a { text-decoration: none; color: #999; font-size: 0.9rem; }

        main { max-width: 1000px; margin: 0 auto; padding: 2rem 2rem 5rem 2rem; }

        section { margin-bottom: 5rem; }

        h2 {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 5px;
            margin-bottom: 2.5rem;
            opacity: 0.8;
        }

        /* --- MAINTAINING ORIGINAL 4-COLUMN SELECTION SIZE --- */
        .art-selection {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 1.5rem;
        }

        .art-selection > img, .art-selection > video { display: none; }

        .gallery-item {
            position: relative;
            aspect-ratio: 1 / 1; /* Keeps the original squared layout proportions */
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1;
        }

        /* SHAPES (Applied to the inner media) */
        .cut-map1 { clip-path: polygon(10% 0, 90% 5%, 100% 40%, 85% 95%, 40% 100%, 0 70%, 5% 20%); }
        .cut-map2 { clip-path: polygon(0 15%, 100% 0, 90% 100%, 15% 85%); }
        .cut-trapezoid { clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%); }
        .cut-rhomboid  { clip-path: polygon(20% 0%, 100% 0%, 80% 100%, 0% 100%); }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(90%) brightness(115%) opacity(0.9);
            transition: all 0.4s ease-in-out;
            display: block !important;
        }

        /* Texture overlay for the "printed" feel */
        .gallery-item::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: var(--ink-texture);
            background-size: 2px 2px;
            mix-blend-mode: multiply;
            pointer-events: none;
            opacity: 0.6;
            transition: opacity 0.3s;
            z-index: 2;
        }

        /* --- HOVER REVEAL: Respecting Original Intent --- */
        .gallery-item:hover {
            z-index: 100;
            transform: scale(1.1) rotate(0deg) !important;
        }

        .gallery-item:hover img, .gallery-item:hover video {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%) !important;
            filter: grayscale(0%) contrast(100%) brightness(100%);
            opacity: 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .gallery-item:hover::after { opacity: 0; }

        .full-link {
            display: inline-block;
            font-size: 0.85rem;
            color: #999;
            text-decoration: none;
            border-bottom: 1px solid #ccc;
            transition: color 0.3s;
        }

        .full-link:hover { color: var(--text-color); border-color: var(--text-color); }

        /* LIGHTBOX: ORIGINAL QUALITY */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }

        #lightbox-content { position: relative; max-width: 80%; max-height: 80%; display: flex; justify-content: center; align-items: center; }
        
        #lightbox-img, #lightbox-video { 
            max-width: 100%; 
            max-height: 80vh; 
            filter: none !important; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.05); 
        }
        
        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); font-size: 2rem; background: none; border: none; cursor: pointer; padding: 20px; color: var(--text-color); font-family: 'Courier Prime', monospace; z-index: 1010; }
        #prev-btn { left: -80px; }
        #next-btn { right: -80px; }

        @media (max-width: 768px) {
            .art-selection { grid-template-columns: repeat(2, 1fr); }
            #prev-btn { left: -40px; } #next-btn { right: -40px; }
        }

        footer { padding: 5rem 2rem; text-align: center; font-size: 0.7rem; color: #ccc; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Coral Fustero-Torre</a>
        <nav><a href="index.html">← Menu</a></nav>
    </header>

    <main>
        <section id="photography">
            <h2>Photography</h2>
            <div class="art-selection">
                <img src="img/photography/R1-04013-0012.jpg" data-shape="map1">
                <img src="img/photography/R1-04013-0007.jpg" data-shape="trapezoid">
                <img src="img/photography/R1-04726-0003.jpg" data-shape="rhomboid">
                <img src="img/photography/R1-05190-0015.jpg" data-shape="map2">
            </div>
            <a href="visuals.html" class="full-link">View full photography portfolio →</a>
        </section>

        <section id="collage">
            <h2>Collage</h2>
            <div class="art-selection">
                <img src="img/collage/1.png" data-shape="map2">
                <img src="img/collage/2.png" data-shape="trapezoid">
                <img src="img/collage/3.png" data-shape="rhomboid">
                <img src="img/collage/4.png" data-shape="map1">
            </div>
            <a href="visuals.html#collage" class="full-link">View full collage portfolio →</a>
        </section>

        <section id="super8">
            <h2>Super8</h2>
            <div class="art-selection">
                <video src="vid/super8/flores.mp4" muted loop></video>
                <video src="vid/super8/besito.mp4" muted loop></video>
                <video src="vid/super8/plumitas.mp4" muted loop></video>
                <video src="vid/super8/clip4.mp4" muted loop></video>
            </div>
            <a href="visuals.html#super8" class="full-link">View all film projects →</a>
        </section>
    </main>

    <div id="lightbox" onclick="closeLightbox()">
        <div id="lightbox-content" onclick="event.stopPropagation()">
            <button id="prev-btn" class="nav-arrow" onclick="changeMedia(-1)">←</button>
            <img id="lightbox-img" src="" style="display:none;">
            <video id="lightbox-video" src="" controls style="display:none;"></video>
            <button id="next-btn" class="nav-arrow" onclick="changeMedia(1)">→</button>
        </div>
    </div>

    <script>
        function initializeArtPage() {
            const shapes = ['cut-map1', 'cut-map2', 'cut-trapezoid', 'cut-rhomboid'];
            let mediaItems = [];
            let currentIndex = 0;

            document.querySelectorAll('.art-selection').forEach(section => {
                const elements = Array.from(section.children);
                
                elements.forEach(media => {
                    if (media.tagName === 'IMG' || media.tagName === 'VIDEO') {
                        const wrapper = document.createElement('div');
                        const manualShape = media.getAttribute('data-shape');
                        
                        let assignedCut = manualShape ? `cut-${manualShape}` : shapes[Math.floor(Math.random() * shapes.length)];
                        
                        wrapper.className = `gallery-item ${assignedCut}`;
                        // Scatter rotation
                        wrapper.style.transform = `rotate(${(Math.random() * 6 - 3).toFixed(1)}deg)`;

                        section.replaceChild(wrapper, media);
                        wrapper.appendChild(media);
                        
                        mediaItems.push({ type: media.tagName.toLowerCase(), src: media.src });

                        wrapper.onclick = () => {
                            currentIndex = mediaItems.findIndex(m => m.src === media.src);
                            updateLightbox();
                        };
                    }
                });
            });

            window.updateLightbox = () => {
                const lb = document.getElementById('lightbox');
                const lbImg = document.getElementById('lightbox-img');
                const lbVid = document.getElementById('lightbox-video');
                const item = mediaItems[currentIndex];

                if (item.type === 'img') {
                    lbImg.src = item.src; lbImg.style.display = 'block'; lbVid.style.display = 'none'; lbVid.pause();
                } else {
                    lbVid.src = item.src; lbVid.style.display = 'block'; lbImg.style.display = 'none'; lbVid.play();
                }
                lb.style.display = 'flex';
            };

            window.changeMedia = (step) => {
                currentIndex = (currentIndex + step + mediaItems.length) % mediaItems.length;
                updateLightbox();
            };

            window.closeLightbox = () => {
                document.getElementById('lightbox').style.display = 'none';
                document.getElementById('lightbox-video').pause();
            };
        }

        initializeArtPage();
    </script>
    
    <footer>&copy; 2026 Coral Fustero-Torre</footer>
</body>
</html>
